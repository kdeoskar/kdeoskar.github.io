<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="../css/styles-responsive.css">
    <style>
        body {
            overflow: hidden;
        }

        .notes-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 0;
        }

        .notes-page {
            display: flex;
            height: calc(100vh - 40px);
            padding: 20px;
            gap: 20px;
        }

        .notes-box {
            background-color: #44473c;
            border: 2px solid #faf8ed;
            border-radius: 20px;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .notes-box-left {
            width: 40%;
        }

        .notes-box-right {
            width: 60%;
        }

        .notes-box h2 {
            font-size: 1.4em;
            margin-bottom: 16px;
            color: #faf8ed;
        }

        .notes-save-hint {
            font-size: 0.8em;
            opacity: 0.5;
            margin-left: 12px;
        }

        /* Free-text editable areas */
        .notes-editable {
            outline: none;
            line-height: 1.6;
            font-size: 1em;
            color: #faf8ed;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 80px;
        }

        .notes-editable:empty:before {
            content: attr(data-placeholder);
            opacity: 0.4;
        }

        .notes-right-editable {
            flex: 1;
        }

        .notes-divider {
            border: none;
            border-top: 1px solid rgba(250, 248, 237, 0.2);
            margin: 24px 0;
        }

        /* To-do input row */
        .todo-add-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        #todoInput {
            flex: 1;
            padding: 10px 14px;
            background-color: rgba(250, 248, 237, 0.07);
            border: 1px solid rgba(250, 248, 237, 0.25);
            border-radius: 8px;
            color: #faf8ed;
            font-size: 0.95em;
            font-family: inherit;
        }

        #todoInput:focus {
            outline: none;
            border-color: #a773c9;
        }

        #todoAddBtn {
            padding: 10px 18px;
            background-color: #a773c9;
            border: none;
            border-radius: 8px;
            color: #faf8ed;
            cursor: pointer;
            font-size: 0.95em;
            transition: background-color 0.2s;
        }

        #todoAddBtn:hover {
            background-color: #8e5db0;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: rgba(250, 248, 237, 0.05);
            border-left: 4px solid #a773c9;
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 10px;
        }

        .todo-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #a773c9;
            cursor: pointer;
            flex-shrink: 0;
        }

        .todo-item span {
            flex: 1;
            word-break: break-word;
        }

        .todo-item.completed {
            border-left-color: #51cf66;
            opacity: 0.7;
        }

        .todo-item.completed span {
            text-decoration: line-through;
        }

        .todo-delete {
            background: none;
            border: none;
            color: #faf8ed;
            opacity: 0.5;
            cursor: pointer;
            font-size: 1.1em;
            line-height: 1;
            flex-shrink: 0;
        }

        .todo-delete:hover {
            opacity: 1;
            color: #ff6b6b;
        }

        .todo-empty {
            opacity: 0.4;
            font-size: 0.9em;
            padding: 4px 0 0;
        }

        /* Completed tasks toggle */
        .completed-toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }

        .completed-toggle-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #a773c9;
            cursor: pointer;
        }

        .completed-toggle-row label {
            cursor: pointer;
            opacity: 0.8;
        }

        #completedList {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            margin-top: 0;
        }

        #completedList.show {
            max-height: 1000px;
            margin-top: 14px;
        }

        /* Scrollbars to match rest of site */
        .notes-box::-webkit-scrollbar {
            width: 10px;
        }

        .notes-box::-webkit-scrollbar-track {
            background: rgba(250, 248, 237, 0.1);
            border-radius: 10px;
        }

        .notes-box::-webkit-scrollbar-thumb {
            background: #a773c9;
            border-radius: 10px;
        }

        .notes-box::-webkit-scrollbar-thumb:hover {
            background: #8e5db0;
        }

        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                height: auto;
            }

            .notes-page {
                flex-direction: column;
                height: auto;
            }

            .notes-box-left,
            .notes-box-right {
                width: 100%;
                max-height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="notes-topbar">
        <a href="../index.html" class="back-link">← Back</a>
        <span class="notes-save-hint" id="saveHint"></span>
    </div>

    <div class="notes-page">
        <div class="notes-box notes-box-left">
            <h2> Papers to read </h2>

            <div class="notes-editable" id="leftNotes" contenteditable="true" data-placeholder="Type notes here..."></div>

            <hr class="notes-divider">

            <div class="todo-add-row">
                <input type="text" id="todoInput" placeholder="Add a task and press Enter...">
                <button id="todoAddBtn">Add</button>
            </div>
            <ul class="todo-list" id="todoList"></ul>
            <p class="todo-empty" id="todoEmptyHint">No tasks yet.</p>

            <hr class="notes-divider">

            <div class="completed-toggle-row" id="completedToggleRow">
                <input type="checkbox" id="completedToggle">
                <label for="completedToggle">Completed tasks (<span id="completedCount">0</span>)</label>
            </div>
            <ul class="todo-list" id="completedList"></ul>
        </div>

        <div class="notes-box notes-box-right">
            <h2>Misc Notes</h2>
            <div class="notes-editable notes-right-editable" id="rightNotes" contenteditable="true" data-placeholder="Jot down anything here..."></div>
        </div>
    </div>

    <script src="../javascript/notes.js"></script>
</body>
</html>
